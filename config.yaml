        - "Core OS: Linux (RHEL/CentOS, Ubuntu), Windows Server"
        - "Networking: TCP/IP, DNS, DHCP, Network Administration"
        - "Automation: Go, Python, PowerShell, Bash"
        - "Observability: Prometheus, Grafana, Incident Management"
