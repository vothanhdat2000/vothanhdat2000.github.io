    image: "/images/personal.jpg"
    content: |-
      I am a **DevOps & SRE Specialist** bridging the gap between Operations and Engineering through advanced automation and cloud architecture.
      
      Focusing on building resilient and scalable systems, I specialize in:
      * **Infrastructure as Code:** Managing hybrid environments with Docker, Kubernetes, and Terraform.
      * **Observability:** Architecting monitoring solutions with Prometheus & Grafana to ensure 99.9x% SLA.
      * **Automation:** Eliminating operational toil using Python, Go, PowerShell, and CI/CD pipelines.

      Currently at **Gameloft**, I manage and automate Cloud-native infrastructure, optimizing CI/CD pipelines, and ensuring high availability for critical in-house backend services. Previously, I managed Tier-3 critical infrastructure at **Microsoft** for Identity ecosystems and ensured the reliability of large-scale data platforms at **Spotify**.

      **Next Milestone:** Deepening expertise in Core Enterprise Infrastructure with active preparation for **CCNA** and **RHCSA** certifications.

      Based in Ho Chi Minh City, Vietnam
      vothanhdat20012000@gmail.com | 0938940150
